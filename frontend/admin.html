<!DOCTYPE html>
<html>
<head>

  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button onclick="logout()">Logout</button>

  <div id="tasks"></div>

  <script src="app.js"></script>
</body>
